<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExamFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4ef;--surface:#ffffff;--surface2:#f5f4ef;--surface3:#eeede8;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1a1a1a;--muted:#8a8a8a;--accent:#c96a2e;--accent2:#b85a1e;--green:#2d7a4f;--red:#c0392b;--amber:#b07d1a;--mono:'DM Mono',monospace;--display:'Syne',sans-serif;--body:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(201,106,46,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(201,106,46,0.02) 0%,transparent 50%);pointer-events:none;z-index:0}
.page{position:relative;z-index:1;min-height:100vh}
.container{max-width:860px;margin:0 auto;padding:0 24px}
.header{padding:20px 0;border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.badge{font-family:var(--mono);font-size:11px;background:rgba(201,106,46,0.1);color:var(--accent2);border:1px solid rgba(201,106,46,0.2);padding:4px 10px;border-radius:100px}

.screen{display:none;animation:fadeUp 0.25s ease}
.screen.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.hero{padding:60px 0 40px;text-align:center}
.hero h1{font-family:var(--display);font-size:clamp(30px,5vw,50px);font-weight:700;letter-spacing:-1.5px;line-height:1.1;margin-bottom:14px}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{color:var(--muted);font-size:15px;max-width:420px;margin:0 auto 36px;line-height:1.6}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-family:var(--body);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--surface2)}
.btn-danger{background:rgba(192,57,43,0.08);color:var(--red);border:1px solid rgba(192,57,43,0.2)}
.btn-danger:hover{background:rgba(192,57,43,0.14)}
.btn-green{background:var(--green);color:#fff;font-weight:600}
.btn-green:hover{opacity:0.9}
.btn-sm{padding:6px 13px;font-size:13px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px}
.card+.card{margin-top:14px}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);font-family:var(--body);outline:none;transition:border 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--muted)}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:500px){.row-2{grid-template-columns:1fr}}

.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:26px}
.tab-btn{flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.15s;font-family:var(--body)}
.tab-btn.active{background:var(--surface3);color:var(--text)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-family:var(--display);font-size:21px;font-weight:700;letter-spacing:-0.5px}

.q-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:10px}
.q-num{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
@media(max-width:500px){.choices-grid{grid-template-columns:1fr}}
.choice-item{display:flex;align-items:center;gap:8px}
.choice-item input[type=text]{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--body);outline:none}
.choice-item input[type=text]:focus{border-color:var(--accent)}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.radio-dot.active{border-color:var(--accent);background:var(--accent)}
.radio-dot.active::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff}

.exam-row{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;transition:border 0.15s}
.exam-row:hover{border-color:var(--border2)}
.exam-title-text{font-family:var(--display);font-size:15px;font-weight:600}
.exam-meta{font-size:12px;color:var(--muted);margin-top:3px;font-family:var(--mono)}

.link-box{background:#f0f7f3;border:1px solid rgba(45,122,79,0.2);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-top:12px}
.link-text{font-family:var(--mono);font-size:11px;color:var(--green);flex:1;word-break:break-all}
.copy-btn{flex-shrink:0;background:rgba(45,122,79,0.1);color:var(--green);border:1px solid rgba(45,122,79,0.25);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:var(--body);white-space:nowrap}
.copy-btn:hover{background:rgba(45,122,79,0.18)}

.results-table{width:100%;border-collapse:collapse}
.results-table th{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:500;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.results-table td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border)}
.results-table tr:last-child td{border-bottom:none}
.score-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-family:var(--mono);font-size:11px;font-weight:500}
.score-pass{background:rgba(45,122,79,0.1);color:var(--green);border:1px solid rgba(45,122,79,0.25)}
.score-fail{background:rgba(192,57,43,0.1);color:var(--red);border:1px solid rgba(192,57,43,0.25)}

.exam-wrap{max-width:620px;margin:0 auto;padding:36px 24px}
.name-wrap{max-width:460px;margin:50px auto;padding:0 24px;text-align:center}
.name-wrap h1{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
.name-wrap p{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.5}
.meta-row{display:flex;justify-content:center;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.meta-chip{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px}

.timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.timer-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;font-family:var(--mono)}
.timer-display{font-family:var(--mono);font-size:28px;font-weight:500;letter-spacing:2px}
.timer-display.warn{color:var(--amber)}
.timer-display.danger{color:var(--red)}
.progress-track{height:3px;background:var(--surface3);border-radius:4px;margin-bottom:32px}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s ease}
.q-score-tag{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px}
.q-text{font-family:var(--display);font-size:19px;font-weight:600;letter-spacing:-0.3px;line-height:1.4;margin-bottom:26px}
.options{display:flex;flex-direction:column;gap:9px;margin-bottom:32px}
.option{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:14px;transition:all 0.15s;text-align:left;color:var(--text)}
.option:hover{border-color:var(--border2);background:var(--surface3)}
.option.selected{border-color:var(--accent);background:rgba(201,106,46,0.07);color:var(--accent2)}
.nav-btns{display:flex;justify-content:space-between;align-items:center}
.q-counter{font-family:var(--mono);font-size:12px;color:var(--muted)}

.done-wrap{text-align:center;padding:60px 24px;max-width:460px;margin:0 auto}
.done-score{font-family:var(--display);font-size:72px;font-weight:700;letter-spacing:-3px;line-height:1}
.done-total{font-family:var(--mono);font-size:16px;color:var(--muted);margin-bottom:6px}

.blocked{text-align:center;padding:80px 24px}
.blocked h2{font-family:var(--display);font-size:22px;font-weight:700;margin:16px 0 8px}
.blocked p{color:var(--muted);font-size:14px}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:13px;color:var(--muted)}

.notify{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:11px 18px;font-size:14px;color:var(--text);z-index:100;animation:slideIn 0.2s ease;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.empty{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="page" id="app">
  <div class="container">
    <div class="header">
      <div class="header-inner">
        <div class="logo">Exam<span>Flow</span></div>
        <div id="header-badge" class="badge">Teacher Dashboard</div>
      </div>
    </div>
  </div>

  <!-- LANDING -->
  <div id="screen-landing" class="screen active">
    <div class="container">
      <div class="hero">
        <h1>Online Exams,<br><em>Done Right</em></h1>
        <p>Create timed exams in minutes. Share a link. Get results from students anywhere — instantly.</p>
        <button class="btn btn-primary" onclick="goTeacher()">Open Teacher Dashboard →</button>
      </div>
    </div>
  </div>

  <!-- TEACHER -->
  <div id="screen-teacher" class="screen">
    <div class="container" style="padding-top:32px;padding-bottom:40px">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('create')">Create Exam</button>
        <button class="tab-btn" onclick="switchTab('exams')">My Exams</button>
        <button class="tab-btn" onclick="switchTab('results')">Results</button>
      </div>

      <!-- CREATE -->
      <div id="tab-create" class="tab-content">
        <div class="section-header"><div class="section-title">New Exam</div></div>
        <div class="card">
          <div class="field"><label>School Name</label><input type="text" id="exam-school" placeholder="e.g. Al-Mustafa Secondary School"></div>
          <div class="row-2">
            <div class="field"><label>Exam Title</label><input type="text" id="exam-title" placeholder="e.g. Chapter 5 Quiz"></div>
            <div class="field"><label>Duration (minutes)</label><input type="number" id="exam-duration" value="30" min="1" max="300"></div>
          </div>
        </div>
        <div id="questions-list" style="margin-top:14px"></div>
        <button class="btn btn-outline" style="width:100%;margin-top:4px" onclick="addQuestion()">+ Add Question</button>
        <div style="display:flex;justify-content:flex-end;margin-top:18px">
          <button class="btn btn-primary" onclick="saveExam()">Save & Get Link →</button>
        </div>
      </div>

      <!-- EXAMS -->
      <div id="tab-exams" class="tab-content" style="display:none">
        <div class="section-header"><div class="section-title">My Exams</div></div>
        <div id="exams-list"></div>
      </div>

      <!-- RESULTS -->
      <div id="tab-results" class="tab-content" style="display:none">
        <div class="section-header"><div class="section-title">Results</div></div>
        <div class="card" style="overflow-x:auto"><div id="results-wrap"></div></div>
      </div>
    </div>
  </div>

  <!-- STUDENT -->
  <div id="screen-student" class="screen">
    <div id="student-inner"></div>
  </div>
</div>

<div id="notify" style="display:none" class="notify"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD3FOJfMzbVUMUUELA-5Z_A3GKFu6R06gc",
  authDomain: "my-exam-d395b.firebaseapp.com",
  projectId: "my-exam-d395b",
  storageBucket: "my-exam-d395b.firebasestorage.app",
  messagingSenderId: "23723417496",
  appId: "1:23723417496:web:1cae52ec76bfadf91255ed"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── State ──
let questions = [];
let timerInt = null;
let timeLeft = 0;
let studentAnswers = {};
let currentQ = 0;
let currentExam = null;
let studentName = '';

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

window.goTeacher = function() {
  document.getElementById('header-badge').style.display = '';
  showScreen('teacher');
  renderBuilder();
};

// ── Routing ──
const params = new URLSearchParams(location.search);
const examId = params.get('exam');
if (examId) {
  document.getElementById('header-badge').style.display = 'none';
  showScreen('student');
  loadStudentExam(examId);
}

// ── Tabs ──
window.switchTab = function(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['create','exams','results'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.getElementById('tab-' + name).style.display = '';
  if (name === 'exams') loadExamsList();
  if (name === 'results') loadResults();
};

// ── Builder ──
window.addQuestion = function() {
  questions.push({ text: '', choices: ['', '', '', ''], correct: 0, score: 5 });
  renderBuilder();
};
window.removeQuestion = function(i) {
  questions.splice(i, 1);
  renderBuilder();
};
window.setCorrect = function(qi, ci) {
  questions[qi].correct = ci;
  renderBuilder();
};

function renderBuilder() {
  if (!questions.length) questions.push({ text: '', choices: ['', '', '', ''], correct: 0, score: 5 });
  document.getElementById('questions-list').innerHTML = questions.map((q, i) => `
    <div class="q-card">
      <div class="q-num">
        <span>QUESTION ${i + 1}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="color:var(--muted);font-size:11px">Score:</span>
          <input type="number" value="${q.score}" min="1" style="width:54px;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:var(--mono);outline:none" onchange="questions[${i}].score=+this.value">
          ${questions.length > 1 ? `<button class="btn btn-danger btn-sm" onclick="removeQuestion(${i})">Remove</button>` : ''}
        </div>
      </div>
      <div class="field" style="margin-bottom:10px">
        <input type="text" placeholder="Question text..." value="${q.text}" oninput="questions[${i}].text=this.value">
      </div>
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px">Choices — click circle to mark correct answer</div>
      <div class="choices-grid">
        ${q.choices.map((c, j) => `
          <div class="choice-item">
            <div class="radio-dot ${q.correct === j ? 'active' : ''}" onclick="setCorrect(${i},${j})"></div>
            <input type="text" placeholder="Option ${j + 1}" value="${c}" oninput="questions[${i}].choices[${j}]=this.value">
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── Save Exam to Firebase ──
window.saveExam = async function() {
  const school = document.getElementById('exam-school').value.trim();
  const title = document.getElementById('exam-title').value.trim();
  const duration = parseInt(document.getElementById('exam-duration').value) || 30;
  if (!school) { notify('Please enter school name', '⚠️'); return; }
  if (!title) { notify('Please enter a title', '⚠️'); return; }
  for (let i = 0; i < questions.length; i++) {
    if (!questions[i].text.trim()) { notify(`Question ${i + 1} has no text`, '⚠️'); return; }
    if (questions[i].choices.some(c => !c.trim())) { notify(`Fill all choices for Q${i + 1}`, '⚠️'); return; }
  }
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const ref = doc(collection(db, 'exams'));
    await setDoc(ref, {
      school, title, duration,
      questions: questions.map(q => ({ ...q, choices: [...q.choices] })),
      created: Date.now()
    });
    notify('Exam saved!', '✓');
    questions = [{ text: '', choices: ['', '', '', ''], correct: 0, score: 5 }];
    renderBuilder();
    document.getElementById('exam-school').value = '';
    document.getElementById('exam-title').value = '';
    document.getElementById('exam-duration').value = '30';
    switchTab('exams');
  } catch (e) {
    notify('Error saving: ' + e.message, '✗');
  }
  btn.disabled = false; btn.textContent = 'Save & Get Link →';
};

// ── Load Exams List ──
async function loadExamsList() {
  const el = document.getElementById('exams-list');
  el.innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading exams...</div></div>';
  try {
    const snap = await getDocs(query(collection(db, 'exams'), orderBy('created', 'desc')));
    const rSnap = await getDocs(collection(db, 'results'));
    const resultCounts = {};
    rSnap.forEach(d => {
      const eid = d.data().examId;
      resultCounts[eid] = (resultCounts[eid] || 0) + 1;
    });
    if (snap.empty) { el.innerHTML = '<div class="empty">No exams yet. Create your first one!</div>'; return; }
    el.innerHTML = snap.docs.map(d => {
      const ex = d.data(); const id = d.id;
      const total = ex.questions.reduce((s, q) => s + q.score, 0);
      const link = location.origin + location.pathname + '?exam=' + id;
      return `<div class="exam-row">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div style="flex:1;min-width:0">
            <div class="exam-title-text">${ex.title}</div>
            ${ex.school ? `<div style="font-size:11px;color:var(--accent);font-family:var(--mono);margin-top:2px">${ex.school}</div>` : ''}
            <div class="exam-meta">${ex.questions.length} questions · ${ex.duration}min · ${total}pts · ${resultCounts[id] || 0} submissions</div>
            <div class="link-box">
              <span class="link-text">${link}</span>
              <button class="copy-btn" onclick="copyLink('${link}',this)">Copy Link</button>
            </div>
          </div>
          <button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="deleteExam('${id}',this)">Delete</button>
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty">Error loading: ${e.message}</div>`;
  }
}

window.deleteExam = async function(id, btn) {
  if (!confirm('Delete this exam and all its results?')) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    await deleteDoc(doc(db, 'exams', id));
    const rSnap = await getDocs(query(collection(db, 'results'), where('examId', '==', id)));
    for (const d of rSnap.docs) await deleteDoc(d.ref);
    notify('Exam deleted', '🗑');
    loadExamsList();
  } catch (e) { notify('Error: ' + e.message, '✗'); btn.disabled = false; btn.textContent = 'Delete'; }
};

window.copyLink = function(link, btn) {
  navigator.clipboard?.writeText(link).catch(() => {
    const t = document.createElement('textarea'); t.value = link;
    document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  });
  const orig = btn.textContent; btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = orig, 1500);
};

// ── Load Results ──
async function loadResults() {
  const el = document.getElementById('results-wrap');
  el.innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading results...</div></div>';
  try {
    const [rSnap, eSnap] = await Promise.all([
      getDocs(query(collection(db, 'results'), orderBy('date', 'desc'))),
      getDocs(collection(db, 'exams'))
    ]);
    const exams = {};
    eSnap.forEach(d => exams[d.id] = d.data());
    if (rSnap.empty) { el.innerHTML = '<div class="empty">No submissions yet.</div>'; return; }
    el.innerHTML = `<table class="results-table">
      <thead><tr><th>Student</th><th>Exam</th><th>Score</th><th>%</th><th>Date</th></tr></thead>
      <tbody>${rSnap.docs.map(d => {
        const r = d.data();
        const ex = exams[r.examId];
        const total = ex ? ex.questions.reduce((s, q) => s + q.score, 0) : r.total || 0;
        const pct = total ? Math.round(r.score / total * 100) : 0;
        const pass = pct >= 50;
        return `<tr>
          <td style="font-weight:500">${r.studentName}</td>
          <td style="color:var(--muted)">${ex ? ex.title : '(deleted)'}</td>
          <td><span class="score-pill ${pass ? 'score-pass' : 'score-fail'}">${r.score}/${total}</span></td>
          <td style="font-family:var(--mono);font-size:12px;color:${pass ? 'var(--green)' : 'var(--red)'}">${pct}%</td>
          <td style="color:var(--muted);font-size:12px;font-family:var(--mono)">${new Date(r.date).toLocaleString()}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

// ── Student Flow ──
async function loadStudentExam(eid) {
  const el = document.getElementById('student-inner');
  el.innerHTML = '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">Loading exam...</div></div>';
  try {
    const snap = await getDoc(doc(db, 'exams', eid));
    if (!snap.exists()) { el.innerHTML = '<div class="blocked"><div style="font-size:52px">🔒</div><h2>Exam Not Found</h2><p>This link is invalid or the exam was removed.</p></div>'; return; }
    currentExam = { id: eid, ...snap.data() };
    const usedKey = 'ef_used_' + eid;
    if (localStorage.getItem(usedKey)) {
      el.innerHTML = '<div class="blocked"><div style="font-size:52px">🔒</div><h2>Already Submitted</h2><p>You can only take this exam once per device.</p></div>'; return;
    }
    renderNameScreen();
  } catch (e) {
    el.innerHTML = `<div class="blocked"><div style="font-size:52px">⚠️</div><h2>Error</h2><p>${e.message}</p></div>`;
  }
}

function renderNameScreen() {
  const ex = currentExam;
  const total = ex.questions.reduce((s, q) => s + q.score, 0);
  document.getElementById('student-inner').innerHTML = `
    <div class="exam-wrap">
      <div class="name-wrap">
        ${ex.school ? `<div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px">${ex.school}</div>` : ''}
        <h1>${ex.title}</h1>
        <p>Read each question carefully. The timer starts when you click Start.</p>
        <div class="meta-row">
          <span class="meta-chip">⏱ ${ex.duration} min</span>
          <span class="meta-chip">📝 ${ex.questions.length} questions</span>
          <span class="meta-chip">⭐ ${total} pts</span>
        </div>
        <div class="field" style="text-align:left">
          <label>Your Full Name</label>
          <input type="text" id="sname" placeholder="Enter your name to begin" style="font-size:15px">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:13px;margin-top:8px" onclick="beginExam()">Start Exam →</button>
        <p style="font-size:12px;color:var(--muted);margin-top:12px">This link works once per device only.</p>
      </div>
    </div>`;
}

window.beginExam = function() {
  const n = document.getElementById('sname').value.trim();
  if (!n) { notify('Please enter your name', '⚠️'); return; }
  studentName = n;
  studentAnswers = {};
  currentQ = 0;
  localStorage.setItem('ef_used_' + currentExam.id, '1');
  timeLeft = currentExam.duration * 60;
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) { clearInterval(timerInt); submitExam(); return; }
    const el = document.querySelector('.timer-display');
    if (el) {
      el.textContent = fmtTime(timeLeft);
      el.className = 'timer-display' + (timeLeft < 60 ? ' danger' : timeLeft < 120 ? ' warn' : '');
    }
  }, 1000);
  renderQ();
};

function fmtTime(s) { return Math.floor(s / 60) + ':' + (s % 60).toString().padStart(2, '0'); }

function renderQ() {
  const ex = currentExam;
  const q = ex.questions[currentQ];
  const pct = Math.round((currentQ / ex.questions.length) * 100);
  const ans = studentAnswers[currentQ];
  document.getElementById('student-inner').innerHTML = `
    <div class="exam-wrap">
      <div class="timer-row">
        <span class="timer-label">Time remaining</span>
        <div class="timer-display${timeLeft < 60 ? ' danger' : timeLeft < 120 ? ' warn' : ''}">${fmtTime(timeLeft)}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="q-score-tag">${q.score} point${q.score !== 1 ? 's' : ''}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.choices.map((c, i) => `<div class="option${ans === i ? ' selected' : ''}" onclick="pickAns(${i})">${c}</div>`).join('')}
      </div>
      <div class="nav-btns">
        ${currentQ > 0 ? `<button class="btn btn-outline" onclick="goQ(${currentQ - 1})">← Back</button>` : '<span></span>'}
        <span class="q-counter">${currentQ + 1} / ${ex.questions.length}</span>
        ${currentQ < ex.questions.length - 1
          ? `<button class="btn btn-primary" onclick="goQ(${currentQ + 1})">Next →</button>`
          : `<button class="btn btn-green" onclick="submitExam()">Submit ✓</button>`}
      </div>
    </div>`;
}

window.pickAns = function(i) { studentAnswers[currentQ] = i; renderQ(); };
window.goQ = function(i) { currentQ = i; renderQ(); };

window.submitExam = async function() {
  clearInterval(timerInt);
  const ex = currentExam;
  let score = 0;
  ex.questions.forEach((q, i) => { if (studentAnswers[i] === q.correct) score += q.score; });
  const total = ex.questions.reduce((s, q) => s + q.score, 0);
  const pct = Math.round(score / total * 100);
  const pass = pct >= 50;
  document.getElementById('student-inner').innerHTML = `
    <div class="exam-wrap">
      <div class="done-wrap">
        <div style="font-size:13px;color:var(--muted);margin-bottom:14px;font-family:var(--mono)">${studentName}</div>
        <div class="done-score" style="color:${pass ? 'var(--green)' : 'var(--red)'}">${score}</div>
        <div class="done-total">out of ${total} points</div>
        <div style="font-size:18px;margin-top:6px;color:${pass ? 'var(--green)' : 'var(--red)'}">${pct}%</div>
        <div style="display:inline-block;padding:6px 18px;border-radius:100px;font-size:14px;font-weight:500;margin-top:14px;background:${pass?'rgba(45,122,79,0.1)':'rgba(192,57,43,0.1)'};color:${pass?'var(--green)':'var(--red)'};border:1px solid ${pass?'rgba(45,122,79,0.25)':'rgba(192,57,43,0.25)'}">${pass ? '✓ Passed' : '✗ Failed'}</div>
        <p style="color:var(--muted);font-size:13px;margin-top:28px">Your result has been sent to the teacher.</p>
      </div>
    </div>`;
  try {
    await addDoc(collection(db, 'results'), {
      examId: ex.id, studentName, score, total, date: Date.now()
    });
  } catch (e) { console.error('Save result error:', e); }
};

// ── Notify ──
let notifyTO;
window.notify = function(msg, icon = '✓') {
  const el = document.getElementById('notify');
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  el.style.display = 'flex';
  clearTimeout(notifyTO);
  notifyTO = setTimeout(() => el.style.display = 'none', 2500);
};

// ── Init ──
renderBuilder();
</script>
</body>
</html>
